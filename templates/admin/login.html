<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if restaurant %}{{ restaurant.name_ar }} — {% endif %}تسجيل الدخول</title>
  {% if restaurant %}
  <style>:root { --primary: {{ restaurant.primary_color }}; --secondary: {{ restaurant.secondary_color }}; }</style>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/themes/theme_' + restaurant.theme_key + '.css') }}">
  {% else %}
  <style>:root { --primary: #6366F1; --secondary: #334155; }</style>
  {% endif %}
  <link rel="stylesheet" href="{{ url_for('static', filename='css/custom.css') }}">
  <style>
    body { background: var(--theme-bg-page,#F8FAFC); display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-card { background: white; border-radius: 20px; padding: 2.5rem 2rem; width: 340px; box-shadow: 0 8px 32px rgba(0,0,0,.1); text-align: center; }
    .login-card h2 { font-size: 1.3rem; font-weight: 800; color: var(--secondary); margin-bottom: 1.5rem; }
    .login-error { background: #FEE2E2; color: #991B1B; border-radius: 8px; padding: .6rem .9rem; font-size: .85rem; font-weight: 600; margin-bottom: 1rem; }
    .login-btn { width: 100%; padding: .8rem; background: var(--primary); color: white; border: none; border-radius: 10px; font-family: 'Cairo', sans-serif; font-weight: 800; font-size: 1rem; cursor: pointer; margin-top: .5rem; }
  </style>
</head>
<body>
  <div class="login-card">
    {% if restaurant and restaurant.logo_filename %}
      <img src="{{ url_for('static', filename='uploads/' + slug + '/logos/' + restaurant.logo_filename) }}"
           style="width:64px;height:64px;border-radius:50%;object-fit:cover;border:3px solid var(--primary);margin-bottom:.75rem;">
    {% else %}
      <div style="font-size:2.5rem;margin-bottom:.5rem;">🍽️</div>
    {% endif %}
    <h2>{% if restaurant %}{{ restaurant.name_ar }}<br><small style="font-size:.75rem;color:#94A3B8;font-weight:400;">لوحة التحكم</small>{% else %}لوحة التحكم{% endif %}</h2>
    {% if error %}<div class="login-error">{{ error }}</div>{% endif %}
    <form method="POST">
      <div class="form-group" style="text-align:right;">
        <label class="form-label">اسم المستخدم</label>
        <input class="form-control" type="text" name="username" required autofocus>
      </div>
      <div class="form-group" style="text-align:right;">
        <label class="form-label">كلمة المرور</label>
        <input class="form-control" type="password" name="password" required>
      </div>
      <button class="login-btn" type="submit">دخول</button>
    </form>
  </div>
</body>
</html>
